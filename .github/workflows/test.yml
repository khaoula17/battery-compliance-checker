name: Tests

# Runs the full test suite (incl. the ruleset integrity lock) on every push and
# pull request. Make this a REQUIRED status check in GitHub branch protection so
# a change that alters the ruleset without updating the fingerprint cannot merge
# or deploy.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test
